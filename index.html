<head>

            background-color: black !important;
            color: #0f0 !important;

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="box">
        <canvas id="canvas"></canvas>

    </div>
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg bg-light">
            <div class="container-fluid">
              <a class="navbar-brand" href="#">Navbar</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Link</a>
                  </li>
                  <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                      Dropdown
                    </a>
                    <ul class="dropdown-menu">
                      <li><a class="dropdown-item" href="#">Action</a></li>
                      <li><a class="dropdown-item" href="#">Another action</a></li>
                      <li><hr class="dropdown-divider"></li>
                      <li><a class="dropdown-item" href="#">Something else here</a></li>
                    </ul>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link disabled">Disabled</a>
                  </li>
                </ul>
                <form class="d-flex" role="search">
                  <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                  <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
              </div>
            </div>
          </nav>
        <div class="row p-5">
            <div class="col-md-4 col-sm-1"></div>
            <div class="col-md-4 col-sm-10">


                <div class="card" aria-hidden="true">
                    <img src="https://i.gifer.com/2LNi.gif" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title text-center">
                            <span class="text-center col-12">cat facts</span>
                        </h5>
                        <p class="card-text placeholder-glow">
                            <span class="placeholder col-12" id="facts"></span>

                        </p>
                        <a href="#" tabindex="-1" class="btn col-6 border-danger "style="color: #0f0" onclick="factsfn()">facts</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-1"></div>
        </div>
    </div>

    <script>
        // geting canvas by id c
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let matrix = "ajay";
        matrix = matrix.split('');
        let colum = canvas.width;
        let font_size = 10;
        ctx.font = font_size;
        let array = [];
        for (let i = 0; i < colum; i++) {
            array[i] = 1;
        }
        function matrixfn() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"
            for (let i = 0; i < colum; i++) {
                ctx.fillText(matrix[Math.floor(Math.random() * matrix.length)], i * font_size, array[i] * font_size);
                if (Math.random() >= .99)
                    array[i] = 0;
                array[i]++;

            }

        }
        let facts=document.getElementById("facts");
        setInterval(matrixfn, 40);
        function factsfn() {
             let xhr = new XMLHttpRequest();
        xhr.open('GET', "https://catfact.ninja/fact");
        xhr.onreadystatechange = function () {
            if (this.status == 200 && this.readyState == 4) {
                console.log(this.responseText)
                facts.innerHTML=JSON.parse(this.responseText).fact.toString();
                facts.classList.remove('placeholder')
            }
        }
        xhr.send();
        }
       
    </script>
</body>

</html>
